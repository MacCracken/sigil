name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Toolchain pin ──
  # Single source of truth for the cyrius version is
  # `cyrius.cyml [package].cyrius` (CLAUDE.md: do not hardcode the
  # toolchain version anywhere else). This job parses it once and
  # exposes it as an output every other job consumes via `needs`.
  setup:
    name: Resolve toolchain pin
    runs-on: ubuntu-latest
    outputs:
      cyrius_version: ${{ steps.pin.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read Cyrius pin from cyrius.cyml
        id: pin
        run: |
          PIN=$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')
          if [ -z "$PIN" ]; then
            echo "ERROR: could not parse [package].cyrius pin from cyrius.cyml"
            exit 1
          fi
          echo "version=$PIN" >> "$GITHUB_OUTPUT"
          echo "Cyrius pin: $PIN"

  # ── Build ──
  build:
    name: Build smoke
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - name: Install Cyrius ${{ needs.setup.outputs.cyrius_version }}
        run: |
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="${{ needs.setup.outputs.cyrius_version }}" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"
      - name: Resolve deps
        run: cyrius deps
      - name: Build smoke
        run: |
          mkdir -p build
          cyrius build -D SIGIL_SMOKE programs/smoke.cyr build/sigil-smoke
          ls -la build/sigil-smoke
      - name: Run smoke
        run: ./build/sigil-smoke

  # ── Tests ──
  test:
    name: Test suite
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - name: Install Cyrius ${{ needs.setup.outputs.cyrius_version }}
        run: |
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="${{ needs.setup.outputs.cyrius_version }}" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"
      - name: Resolve deps
        run: cyrius deps
      - name: Run .tcyr suite
        run: |
          pass=0; fail=0
          for t in tests/tcyr/*.tcyr; do
            name=$(basename "$t" .tcyr)
            if cyrius test "$t" >/dev/null 2>&1; then
              echo "PASS: $name"; pass=$((pass+1))
            else
              echo "FAIL: $name"; fail=$((fail+1))
            fi
          done
          echo "$pass passed, $fail failed"
          test $fail -eq 0

  # ── Lint ──
  lint:
    name: cyrlint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - name: Install Cyrius ${{ needs.setup.outputs.cyrius_version }}
        run: |
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="${{ needs.setup.outputs.cyrius_version }}" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"
      - name: Resolve deps
        run: cyrius deps
      - name: Lint src/*.cyr
        # Treat any `warn` line as a failure, matching the agnosys
        # / yukti pattern. Two files are exempted because they
        # carry indivisible hex-literal lookup tables (>120 chars
        # by intent — they encode constant data, not control
        # flow). Splitting these into smaller chunks would require
        # ~30 lines of init scaffolding per table for a cosmetic
        # win; the data is unchanged across releases and bears
        # no readability cost as a single literal.
        #
        # Exempted:
        #   src/aes_gcm.cyr  — `_aes_sbox_hex` (FIPS 197 §5.1.1 S-box, 512 hex chars)
        #   src/mldsa_ntt.cyr — `_mldsa_zetas_hex` (256 NTT twiddle factors, 2048 hex chars)
        #
        # If a future cyrius cyrlint adds a per-line `# cyrlint:
        # allow line-length` annotation, drop the exemption here
        # and add the inline allow next to each literal.
        run: |
          # `cyrius lint` exits with code 1 when a file has any
          # warnings. Under GitHub Actions' default `bash -e`,
          # the command-substitution assignment would terminate
          # the step the moment we hit aes_gcm.cyr / mldsa_ntt.cyr
          # (both carry the exempted line-length warnings), before
          # the case-branch logic has a chance to classify the
          # output. The trailing `|| true` neutralises the exit
          # code so we can inspect the stdout/stderr ourselves.
          fail=0
          for f in src/*.cyr programs/*.cyr; do
            case "$f" in
              src/aes_gcm.cyr|src/mldsa_ntt.cyr)
                # Allow only line-length warnings from these files;
                # any other warning class still fails the gate.
                out=$(cyrius lint "$f" 2>&1 || true)
                echo "$out"
                non_length=$(echo "$out" | grep -E '^\s*warn ' | grep -v 'line exceeds 120' || true)
                if [ -n "$non_length" ]; then
                  echo "lint: non-length warnings in $f"; fail=1
                fi
                ;;
              *)
                out=$(cyrius lint "$f" 2>&1 || true)
                echo "$out"
                if echo "$out" | grep -qE '^\s*warn '; then
                  echo "lint: warnings in $f"; fail=1
                fi
                ;;
            esac
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }
      - name: Doc coverage (bundle API)
        # The single-file `dist/sigil.cyr` bundle is what downstream
        # consumers — and the main Cyrius language, once sigil is
        # upstreamed — import. Its public API must stay fully
        # documented. Regenerate first so the gate can't pass on a
        # stale committed bundle, then require 0 undocumented fns
        # (`cyrius doc --check` exits non-zero when any remain).
        run: |
          cyrius distlib
          if ! git diff --quiet dist/sigil.cyr dist/sigil.deps; then
            echo "dist/sigil.cyr or dist/sigil.deps is stale — run \`cyrius distlib\` and commit"
            git --no-pager diff --stat dist/sigil.cyr dist/sigil.deps
            exit 1
          fi
          cyrius doc --check dist/sigil.cyr
      - name: Verify per-primitive distlib profiles are in sync
        # `[lib.<prof>]` profiles (3.11.0) let a consumer pull only the
        # primitive it needs (`cyrius distlib sha` -> dist/sigil-sha.cyr, a
        # 5-module closure vs. the 62-module full bundle). Regenerate every
        # profile and fail if any committed bundle drifted from src/.
        run: |
          fail=0
          for prof in sha hmac hkdf aes chacha ed25519 ecdsa mldsa x509 authenticode secureboot tpm; do
            cyrius distlib "$prof"
            if ! git diff --quiet "dist/sigil-$prof.cyr"; then
              echo "ERROR: dist/sigil-$prof.cyr is stale — run 'cyrius distlib $prof' and commit"
              git --no-pager diff --stat "dist/sigil-$prof.cyr"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || exit 1
          echo "all 12 distlib profiles match src/"

  # ── Benchmarks ──
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: setup
    # Benchmarks are perf-tracking, not a correctness gate. The full
    # sigil.bcyr suite (ML-DSA + RSA + EC × 10 rounds) runs minutes, and
    # `cyrius bench` only prints at the end — so this job must never
    # silently block the pipeline. It is time-bounded and non-blocking:
    # a slow/regressed bench surfaces as a (non-failing) annotation, not
    # a stuck CI run. Promote to a gate only with an explicit budget.
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Cyrius ${{ needs.setup.outputs.cyrius_version }}
        run: |
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="${{ needs.setup.outputs.cyrius_version }}" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"
      - name: Resolve deps
        run: cyrius deps
      - name: Run .bcyr suite
        # No 2>/dev/null: surface compile warnings + per-bench results in
        # the CI log so a long run is observable instead of a black box.
        run: CYRIUS_DCE=1 cyrius bench tests/bcyr/sigil.bcyr

  # ── Fuzz ──
  fuzz:
    name: Fuzz (quick)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - name: Install Cyrius ${{ needs.setup.outputs.cyrius_version }}
        run: |
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="${{ needs.setup.outputs.cyrius_version }}" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"
      - name: Resolve deps
        run: cyrius deps
      - name: Run fuzz harnesses (30s budget each)
        run: |
          mkdir -p build
          pass=0; fail=0
          for f in fuzz/*.fcyr; do
            name=$(basename "$f" .fcyr)
            printf "  %-25s " "$name"
            if cyrius build "$f" "build/$name" >/dev/null 2>&1; then
              timeout 30 "build/$name" >/dev/null 2>&1 || true
              rc=$?
              if [ "$rc" -eq 0 ] || [ "$rc" -eq 124 ]; then
                echo "OK"; pass=$((pass+1))
              else
                echo "FAIL (exit $rc)"; fail=$((fail+1))
              fi
            else
              echo "COMPILE FAIL"; fail=$((fail+1))
            fi
          done
          echo "$pass passed, $fail failed"
          test $fail -eq 0

  # ── Security ──
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          fail=0
          # Raw execve outside the controlled process module (if any)
          if grep -rn 'syscall(59' src/ lib/ 2>/dev/null | grep -v process.cyr; then
            echo "WARN: raw execve in source"
          fi
          # Hardcoded keys/secrets: match assignment + long hex literal
          if grep -rEn '(private_key|secret_key|SECRET).*=.*"[0-9a-fA-F]{32,}"' src/ 2>/dev/null \
               | grep -v test | grep -v example | grep -v rfc8032; then
            echo "WARN: possible hardcoded secret"; fail=1
          fi
          echo "security scan complete"
          test $fail -eq 0
