name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CYRIUS_VERSION: "3.3.4"

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius
        run: |
          curl -sSL "https://github.com/MacCracken/cyrius/releases/download/${CYRIUS_VERSION}/cc3" -o /usr/local/bin/cc3
          chmod +x /usr/local/bin/cc3
          cc3 --version

      - name: Run tests
        run: |
          pass=0; fail=0
          for t in tests/tcyr/*.tcyr; do
            name=$(basename "$t" .tcyr)
            printf "  %-20s " "$name"
            if cat "$t" | cc3 > "/tmp/test_${name}" 2>/dev/null && chmod +x "/tmp/test_${name}"; then
              result=$("/tmp/test_${name}" 2>&1 | strings | grep -E "passed.*failed" | tail -1)
              if echo "$result" | grep -q " 0 failed"; then
                echo "$result"; pass=$((pass+1))
              else
                echo "FAIL: $result"; fail=$((fail+1))
              fi
            else
              echo "COMPILE FAIL"; fail=$((fail+1))
            fi
          done
          echo "---"
          echo "$pass passed, $fail failed"
          [ "$fail" -eq 0 ] || exit 1

      - name: Run benchmarks
        run: |
          cat tests/bcyr/sigil.bcyr | cc3 > /tmp/bench_sigil && chmod +x /tmp/bench_sigil
          /tmp/bench_sigil

      - name: Run fuzz (quick)
        run: |
          for f in fuzz/*.fcyr; do
            name=$(basename "$f" .fcyr)
            printf "  %-25s " "$name"
            if cat "$f" | cc3 > "/tmp/${name}" 2>/dev/null && chmod +x "/tmp/${name}"; then
              timeout 10 "/tmp/${name}" 2>&1 && echo "OK" || echo "FAIL"
            else
              echo "COMPILE FAIL"
            fi
          done
