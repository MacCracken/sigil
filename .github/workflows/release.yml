name: Release

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+*"]

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION ($FILE_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml ($CARGO_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"
      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BODY=$(awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            echo "WARNING: No CHANGELOG entry found for $VERSION"
            BODY="No changelog entry for this release."
          fi
          echo "$BODY" > /tmp/release-body.md
      - name: Build source tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="sigil-${TAG}/" -o "sigil-${TAG}.tar.gz" HEAD
      - name: Vendor dependencies
        run: |
          TAG="${GITHUB_REF_NAME}"
          cargo vendor vendor/
          tar czf "sigil-${TAG}-vendor.tar.gz" vendor/
          rm -rf vendor/
      - name: Generate checksums
        run: |
          TAG="${GITHUB_REF_NAME}"
          sha256sum sigil-${TAG}.tar.gz sigil-${TAG}-vendor.tar.gz > SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "sigil ${{ github.ref_name }}"
          body_path: /tmp/release-body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
          files: |
            sigil-${{ github.ref_name }}.tar.gz
            sigil-${{ github.ref_name }}-vendor.tar.gz
            SHA256SUMS
